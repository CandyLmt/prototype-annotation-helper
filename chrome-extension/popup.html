<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原型标注助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      height: 560px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(180deg, #fdfcff 0%, #f8f6ff 30%, #f4f8ff 50%, #f6f4ff 70%, #fcfbff 100%);
      color: #4c1d95;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 15% 15%, rgba(230, 196, 254, 0.35) 0%, transparent 45%),
                  radial-gradient(circle at 85% 85%, rgba(168, 230, 255, 0.28) 0%, transparent 45%),
                  radial-gradient(circle at 50% 50%, rgba(210, 196, 254, 0.18) 0%, transparent 55%),
                  radial-gradient(circle at 90% 20%, rgba(196, 211, 254, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 10% 80%, rgba(230, 220, 255, 0.12) 0%, transparent 40%);
      pointer-events: none;
      animation: subtleFloat 8s ease-in-out infinite;
    }

    @keyframes subtleFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(2%, 2%) rotate(0.5deg); }
    }

    .header {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(248, 246, 255, 0.75) 40%, rgba(244, 248, 255, 0.7) 60%, rgba(248, 244, 255, 0.8) 100%);
      color: #4c1d95;
      padding: 22px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-bottom: 1px solid rgba(230, 196, 254, 0.25);
      box-shadow: 0 4px 30px rgba(230, 196, 254, 0.12), 0 1px 8px rgba(168, 230, 255, 0.08);
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 25% 25%, rgba(230, 196, 254, 0.28) 0%, transparent 45%),
                  radial-gradient(circle at 75% 75%, rgba(168, 230, 255, 0.2) 0%, transparent 45%),
                  radial-gradient(circle at 50% 50%, rgba(196, 211, 254, 0.12) 0%, transparent 50%);
    }

    .header::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 5px;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, #4c1d95 0%, #6d28d9 50%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 12px;
      opacity: 0.75;
      color: #7c3aed;
      position: relative;
      z-index: 1;
      letter-spacing: 0.4px;
      font-weight: 400;
    }

    .content {
      padding: 16px;
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .auth-section {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(248, 246, 255, 0.7) 40%, rgba(244, 248, 255, 0.65) 60%, rgba(248, 244, 255, 0.75) 100%);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
      border: 1px solid rgba(230, 196, 254, 0.22);
      box-shadow: 0 10px 40px rgba(230, 196, 254, 0.1), 0 3px 12px rgba(168, 230, 255, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .auth-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .auth-avatar {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, #e6c4fe 0%, #d4c0fe 30%, #c8d4fe 60%, #d2c4fe 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6d28d9;
      font-size: 17px;
      font-weight: 600;
      box-shadow: 0 10px 28px rgba(230, 196, 254, 0.35), 0 4px 12px rgba(168, 230, 255, 0.15), inset 0 2px 6px rgba(255, 255, 255, 0.7);
      position: relative;
      overflow: hidden;
    }

    .auth-avatar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.4) 0%, transparent 100%);
    }

    .auth-info {
      flex: 1;
    }

    .auth-name {
      font-size: 14px;
      font-weight: 600;
      color: #4c1d95;
      letter-spacing: -0.2px;
    }

    .auth-email {
      font-size: 12px;
      color: #7c3aed;
      margin-top: 2px;
      opacity: 0.85;
    }

    .auth-error {
      font-size: 11px;
      color: #ef4444;
      margin-bottom: 12px;
      display: none;
      padding: 9px 12px;
      background: rgba(239, 68, 68, 0.07);
      border-radius: 10px;
      border: 1px solid rgba(239, 68, 68, 0.12);
    }

    .auth-error.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(230, 196, 254, 0.3);
      border-radius: 14px;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
      background: rgba(255, 255, 255, 0.65);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      color: #4c1d95;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.03);
    }

    .auth-input:focus {
      border-color: rgba(139, 92, 246, 0.45);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.12), inset 0 2px 8px rgba(0, 0, 0, 0.03);
    }

    .auth-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 10px;
      letter-spacing: 0.2px;
    }

    .auth-btn-primary {
      background: linear-gradient(135deg, #e6c4fe 0%, #d4c0fe 30%, #c8d4fe 60%, #d2c4fe 100%);
      color: #6d28d9;
      box-shadow: 0 10px 28px rgba(230, 196, 254, 0.35), 0 4px 12px rgba(168, 230, 255, 0.15), inset 0 2px 6px rgba(255, 255, 255, 0.7);
      position: relative;
      overflow: hidden;
    }

    .auth-btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.3) 0%, transparent 100%);
    }

    .auth-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 36px rgba(230, 196, 254, 0.4), 0 6px 16px rgba(168, 230, 255, 0.2), inset 0 2px 6px rgba(255, 255, 255, 0.8);
    }

    .auth-btn-primary:active {
      transform: translateY(0);
    }

    .auth-btn-secondary {
      background: rgba(139, 92, 246, 0.06);
      color: #7c3aed;
      border: 1px solid rgba(139, 92, 246, 0.15);
    }

    .auth-btn-secondary:hover {
      background: rgba(139, 92, 246, 0.12);
      border-color: rgba(139, 92, 246, 0.28);
    }

    .toggle-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(248, 246, 255, 0.7) 40%, rgba(244, 248, 255, 0.65) 60%, rgba(248, 244, 255, 0.75) 100%);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 20px;
      padding: 17px 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(230, 196, 254, 0.22);
      box-shadow: 0 10px 40px rgba(230, 196, 254, 0.1), 0 3px 12px rgba(168, 230, 255, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle-section:hover {
      box-shadow: 0 14px 48px rgba(230, 196, 254, 0.14), 0 4px 16px rgba(168, 230, 255, 0.12);
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toggle-icon {
      width: 24px;
      height: 24px;
      color: #8b5cf6;
    }

    .toggle-text {
      font-size: 14px;
      font-weight: 500;
      color: #4c1d95;
      letter-spacing: -0.2px;
    }

    .toggle-switch {
      position: relative;
      width: 50px;
      height: 28px;
      cursor: pointer;
    }

    .toggle-track {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(156, 163, 175, 0.25);
      border-radius: 14px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle-switch.active .toggle-track {
      background: linear-gradient(135deg, #e6c4fe 0%, #d4c0fe 30%, #c8d4fe 60%, #d2c4fe 100%);
      box-shadow: 0 0 24px rgba(230, 196, 254, 0.45), 0 4px 12px rgba(168, 230, 255, 0.15);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      background: linear-gradient(135deg, #ffffff 0%, #f8f6ff 100%);
      border-radius: 50%;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12), inset 0 1px 2px rgba(255, 255, 255, 0.8);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle-switch.active .toggle-thumb {
      transform: translateX(22px);
      box-shadow: 0 3px 12px rgba(139, 92, 246, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 13px 14px;
      border: none;
      border-radius: 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.3) 0%, transparent 100%);
    }

    .btn-export {
      background: linear-gradient(135deg, rgba(230, 196, 254, 0.25) 0%, rgba(196, 211, 254, 0.2) 100%);
      color: #7c3aed;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .btn-export:hover {
      background: linear-gradient(135deg, rgba(230, 196, 254, 0.35) 0%, rgba(196, 211, 254, 0.3) 100%);
      border-color: rgba(139, 92, 246, 0.35);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(230, 196, 254, 0.25), 0 4px 12px rgba(168, 230, 255, 0.12);
    }

    .btn-import {
      background: linear-gradient(135deg, rgba(168, 230, 255, 0.25) 0%, rgba(196, 211, 254, 0.2) 100%);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .btn-import:hover {
      background: linear-gradient(135deg, rgba(168, 230, 255, 0.35) 0%, rgba(196, 211, 254, 0.3) 100%);
      border-color: rgba(59, 130, 246, 0.35);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(168, 230, 255, 0.25), 0 4px 12px rgba(230, 196, 254, 0.12);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.08);
      color: #dc2626;
      border: 1px solid rgba(239, 68, 68, 0.18);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.18);
    }

    .btn-clear {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 12px;
      background: rgba(239, 68, 68, 0.05);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.12);
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-clear:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.22);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(239, 68, 68, 0.14);
    }

    .stats-bar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stats-bar .stats-row {
      flex: 1;
      margin: 0;
      padding: 10px 14px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(230, 196, 254, 0.25), rgba(168, 230, 255, 0.2), transparent);
      margin: 18px 0;
    }

    .stats-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(248, 246, 255, 0.75) 100%);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 14px;
      padding: 14px 16px;
      border: 1px solid rgba(230, 196, 254, 0.18);
      box-shadow: 0 8px 32px rgba(230, 196, 254, 0.08), 0 2px 8px rgba(168, 230, 255, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stats-row:hover {
      box-shadow: 0 12px 40px rgba(230, 196, 254, 0.12), 0 4px 12px rgba(168, 230, 255, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.95);
    }

    .stats-title {
      font-size: 12px;
      color: #7c3aed;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .stats-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-number {
      font-size: 18px;
      font-weight: 700;
      color: #4c1d95;
      letter-spacing: -0.5px;
    }

    .stats-arrow {
      font-size: 11px;
      color: #a78bfa;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stats-row.expanded .stats-arrow {
      transform: rotate(180deg);
    }

    .annotation-list {
      margin-top: 12px;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 4px;
      display: none;
    }

    .annotation-list.show {
      display: block;
    }

    .annotation-list::-webkit-scrollbar {
      width: 4px;
    }

    .annotation-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .annotation-list::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.4);
      border-radius: 2px;
    }

    .annotation-item {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
    }

    .annotation-item:hover {
      transform: translateX(4px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .annotation-item-selector {
      font-size: 10px;
      color: #7c3aed;
      background: rgba(139, 92, 246, 0.08);
      padding: 3px 8px;
      border-radius: 8px;
      display: inline-block;
      margin-bottom: 8px;
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .annotation-item-text {
      font-size: 13px;
      color: #4c1d95;
      line-height: 1.5;
    }

    .annotation-item-time {
      font-size: 11px;
      color: #a78bfa;
      margin-top: 8px;
      letter-spacing: 0.2px;
    }

    .annotation-item-user {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(156, 163, 175, 0.1);
    }

    .annotation-item-user-avatar {
      width: 20px;
      height: 20px;
      border-radius: 8px;
      background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 50%, #d946ef 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 10px;
      font-weight: 600;
    }

    .annotation-item-user-name {
      font-size: 11px;
      color: #7c3aed;
    }

    .empty-state {
      text-align: center;
      padding: 32px 20px;
      color: #a78bfa;
    }

    .empty-state-icon {
      font-size: 36px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 12px;
      line-height: 1.6;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(248, 246, 255, 0.75) 100%);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 14px;
      padding: 13px 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(230, 196, 254, 0.18);
      box-shadow: 0 8px 32px rgba(230, 196, 254, 0.08), 0 2px 8px rgba(168, 230, 255, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      position: relative;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-box:focus-within {
      border-color: rgba(139, 92, 246, 0.35);
      box-shadow: 0 10px 40px rgba(230, 196, 254, 0.12), 0 4px 12px rgba(168, 230, 255, 0.08);
    }

    .search-box svg {
      color: #a78bfa;
      flex-shrink: 0;
      width: 16px;
      height: 16px;
    }

    .search-box input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 13px;
      color: #4c1d95;
      letter-spacing: 0.2px;
    }

    .search-box input::placeholder {
      color: #a78bfa;
      opacity: 0.7;
    }

    .search-count {
      font-size: 11px;
      color: #7c3aed;
      background: rgba(139, 92, 246, 0.06);
      padding: 3px 9px;
      border-radius: 10px;
      white-space: nowrap;
      font-weight: 500;
    }

    .batch-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(239, 68, 68, 0.06);
      border: 1px solid rgba(239, 68, 68, 0.15);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 12px;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .batch-info {
      font-size: 12px;
      color: #ef4444;
      font-weight: 500;
    }

    .batch-info span {
      font-weight: 700;
    }

    .btn-batch-delete {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: rgba(239, 68, 68, 0.12);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-batch-delete:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.35);
    }

    .annotation-item {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(248, 246, 255, 0.75) 100%);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(230, 196, 254, 0.15);
      box-shadow: 0 6px 20px rgba(230, 196, 254, 0.06), 0 2px 6px rgba(168, 230, 255, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      position: relative;
    }

    .annotation-item:hover {
      transform: translateX(4px);
      box-shadow: 0 10px 28px rgba(230, 196, 254, 0.1), 0 4px 10px rgba(168, 230, 255, 0.06);
    }

    .annotation-item-checkbox {
      position: absolute;
      top: 13px;
      left: 13px;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(139, 92, 246, 0.22);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255, 255, 255, 0.9);
      z-index: 10;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    .annotation-item-checkbox:hover {
      border-color: rgba(139, 92, 246, 0.5);
      box-shadow: 0 3px 10px rgba(139, 92, 246, 0.12);
    }

    .annotation-item-checkbox.checked {
      background: linear-gradient(135deg, #e6c4fe 0%, #d4c0fe 30%, #c8d4fe 60%, #d2c4fe 100%);
      border-color: #8b5cf6;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
    }

    .annotation-item-checkbox.checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #6d28d9;
      font-size: 11px;
      font-weight: 700;
    }

    .annotation-item-checkbox.disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .annotation-item-checkbox.disabled:hover {
      border-color: rgba(139, 92, 246, 0.22);
      box-shadow: none;
    }

    .annotation-item.selected {
      border-color: #8b5cf6;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.08) 0%, rgba(168, 230, 255, 0.05) 100%);
      box-shadow: 0 10px 28px rgba(139, 92, 246, 0.14), 0 4px 10px rgba(168, 230, 255, 0.08);
    }

    .annotation-item-content {
      margin-left: 28px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>原型标注助手</h1>
    <p>在任意页面添加功能注释</p>
  </div>

  <div class="content">
    <div class="auth-section" id="authSection">
      <div class="auth-header">
        <div class="auth-avatar" id="userAvatar">U</div>
        <div class="auth-info">
          <div class="auth-name" id="userName">获取用户信息中...</div>
          <div class="auth-email" id="userEmail">-</div>
        </div>
      </div>
      <div class="auth-error" id="authError">⚠️ 请设置用户标识</div>
      <div id="manualUserInput" style="display: none;">
        <input type="text" id="manualUserId" class="auth-input" placeholder="输入用户标识（邮箱或任意名称）">
        <button id="saveUserIdBtn" class="auth-btn auth-btn-primary">保存用户标识</button>
      </div>
    </div>
    <div class="toggle-section" id="toggleSection">
      <div class="toggle-label">
        <svg class="toggle-icon" viewBox="0 0 18 18" fill="none">
          <path d="M9 2v14M2 9h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="toggle-text">添加标注</span>
      </div>
      <div class="toggle-switch" id="toggleSwitch">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </div>
    </div>

    <div class="btn-group">
      <button id="exportBtn" class="btn btn-export" title="导出标注">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
          <path d="M9 2v10M5 8l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 14h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>导出</span>
      </button>
      <button id="importBtn" class="btn btn-import" title="导入标注">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
          <path d="M9 12V2M5 6l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 14h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>导入</span>
      </button>
    </div>

    <input type="file" id="importFile" accept=".json" style="display: none;">

    <div class="divider"></div>

    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 12l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="搜索标注内容...">
      <span class="search-count" id="searchCount">0/0</span>
    </div>

    <div class="batch-actions" id="batchActions" style="display: none;">
      <span class="batch-info">已选择 <span id="selectedCount">0</span> 项</span>
      <button id="batchDeleteBtn" class="btn-batch-delete">
        <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
          <path d="M4 6h10M7 6V4h4v2M7 6v8a2 2 0 002 2h0a2 2 0 002-2V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        删除选中</button>
    </div>

    <div class="stats-bar">
      <div class="stats-row" id="statsRow">
        <span class="stats-title">本页注释</span>
        <div class="stats-info">
          <span class="stats-number" id="annotationCount">0</span>
          <span class="stats-arrow">▼</span>
        </div>
      </div>
      <button id="clearAll" class="btn-clear" title="清除本页注释">
        <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
          <path d="M4 6h10M7 6V4h4v2M7 6v8a2 2 0 002 2h0a2 2 0 002-2V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>清除</span>
      </button>
    </div>

    <div class="annotation-list" id="annotationList">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">📝</div>
        <div class="empty-state-text">暂无注释<br>开启"添加标注"开始添加</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
